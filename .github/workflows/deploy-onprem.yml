name: Deploy On-Prem

on:
  workflow_dispatch:

concurrency:
  group: onprem-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: onprem-live
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        shell: bash
        run: |
          set -eu
          APP_VERSION="$(sed -nE 's/^[[:space:]]*version = "([^"]+)".*/\1/p' build.gradle.kts | head -n 1)"
          if [ -z "${APP_VERSION}" ]; then
            APP_VERSION="0.0.0"
          fi
          SAFE_VERSION="$(printf '%s' "${APP_VERSION}" | tr -c 'A-Za-z0-9._-' '-' | sed -E 's/^-+//; s/-+$//')"
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_TAG="${SAFE_VERSION}-${SHORT_SHA}"
          BOT_IMAGE_TAR="bybit-trader-v${SAFE_VERSION}-${SHORT_SHA}.tar.gz"
          DASHBOARD_IMAGE_TAR="bybit-trader-dashboard-v${SAFE_VERSION}-${SHORT_SHA}.tar.gz"

          docker build --tag "bybit-trader:${IMAGE_TAG}" .
          docker build --file apps/dashboard/Dockerfile --tag "bybit-trader-dashboard:${IMAGE_TAG}" apps/dashboard
          mkdir -p deploy-package/config deploy-package/images
          docker save "bybit-trader:${IMAGE_TAG}" | gzip > "deploy-package/images/${BOT_IMAGE_TAR}"
          docker save "bybit-trader-dashboard:${IMAGE_TAG}" | gzip > "deploy-package/images/${DASHBOARD_IMAGE_TAR}"
          cp compose.yaml deploy-package/compose.yaml
          cp config/volume-flow-composite-current.json deploy-package/config/volume-flow-composite-current.json
          cat > deploy-package/release.env <<EOF
          APP_VERSION=${SAFE_VERSION}
          GIT_SHA=${GITHUB_SHA}
          SHORT_SHA=${SHORT_SHA}
          IMAGE_TAG=${IMAGE_TAG}
          BOT_IMAGE=bybit-trader:${IMAGE_TAG}
          DASHBOARD_IMAGE=bybit-trader-dashboard:${IMAGE_TAG}
          BOT_IMAGE_TAR=${BOT_IMAGE_TAR}
          DASHBOARD_IMAGE_TAR=${DASHBOARD_IMAGE_TAR}
          EOF

      - name: Build runtime env file
        env:
          BOT_MODE: ${{ vars.BOT_MODE || 'LIVE' }}
          BOT_API_HOST: ${{ vars.BOT_API_HOST || '0.0.0.0' }}
          BOT_API_PORT: ${{ vars.BOT_API_PORT || '8080' }}
          "BOT_CONTROL_TOKEN": ${{ secrets.BOT_CONTROL_TOKEN }}
          BOT_DATABASE_PATH: ${{ vars.BOT_DATABASE_PATH || '/data/bybit-trader.sqlite' }}
          BOT_SYMBOL: ${{ vars.BOT_SYMBOL || 'BTCUSDT' }}
          BOT_TIMEFRAMES: ${{ vars.BOT_TIMEFRAMES || 'M1,M5,M15' }}
          BOT_VOLUME_FLOW_COMPOSITE_CONFIG_PATH: ${{ vars.BOT_VOLUME_FLOW_COMPOSITE_CONFIG_PATH || '/opt/bybit-trader/config/volume-flow-composite-current.json' }}
          BOT_STRATEGY_PROFILE_STATE_PATH: ${{ vars.BOT_STRATEGY_PROFILE_STATE_PATH || '/data/strategy-profile-current.txt' }}
          BOT_FORWARD_MARKET_CAPTURE_ENABLED: ${{ vars.BOT_FORWARD_MARKET_CAPTURE_ENABLED || 'false' }}
          BYBIT_PUBLIC_WEBSOCKET_URL: ${{ vars.BYBIT_PUBLIC_WEBSOCKET_URL }}
          BOT_FORWARD_ORDER_BOOK_DEPTH: ${{ vars.BOT_FORWARD_ORDER_BOOK_DEPTH || '50' }}
          "BYBIT_API_KEY": ${{ secrets.BYBIT_API_KEY }}
          "BYBIT_API_SECRET": ${{ secrets.BYBIT_API_SECRET }}
          BYBIT_PRIVATE_BASE_URL: ${{ vars.BYBIT_PRIVATE_BASE_URL }}
          BYBIT_RECV_WINDOW_MILLIS: ${{ vars.BYBIT_RECV_WINDOW_MILLIS || '5000' }}
          BYBIT_POSITION_IDX: ${{ vars.BYBIT_POSITION_IDX || '0' }}
          BYBIT_ACCOUNT_TYPE: ${{ vars.BYBIT_ACCOUNT_TYPE || 'UNIFIED' }}
          BOT_PRIVATE_EXECUTION_ENABLED: ${{ vars.BOT_PRIVATE_EXECUTION_ENABLED || 'true' }}
          BOT_EXECUTION_LOOP_ENABLED: ${{ vars.BOT_EXECUTION_LOOP_ENABLED || 'false' }}
          BOT_EXECUTION_TIMEFRAME: ${{ vars.BOT_EXECUTION_TIMEFRAME || 'M5' }}
          BOT_EXECUTION_CANDLE_LIMIT: ${{ vars.BOT_EXECUTION_CANDLE_LIMIT || '18000' }}
          BOT_EXECUTION_SYNC_LIMIT: ${{ vars.BOT_EXECUTION_SYNC_LIMIT || '1000' }}
          BOT_EXECUTION_ALERT_BATCH_LIMIT: ${{ vars.BOT_EXECUTION_ALERT_BATCH_LIMIT || '100' }}
          BOT_EXECUTION_INTERVAL_SECONDS: ${{ vars.BOT_EXECUTION_INTERVAL_SECONDS || '300' }}
          BOT_EXECUTION_ACCOUNT_EQUITY: ${{ vars.BOT_EXECUTION_ACCOUNT_EQUITY || '660' }}
          BOT_EXECUTION_USE_LIVE_EQUITY: ${{ vars.BOT_EXECUTION_USE_LIVE_EQUITY || 'true' }}
          BOT_EXECUTION_RISK_FRACTION: ${{ vars.BOT_EXECUTION_RISK_FRACTION || '0.055' }}
          BOT_EXECUTION_FEE_RATE: ${{ vars.BOT_EXECUTION_FEE_RATE || '0.0006' }}
          BOT_EXECUTION_SLIPPAGE_BUFFER_RATE: ${{ vars.BOT_EXECUTION_SLIPPAGE_BUFFER_RATE || '0.0002' }}
          BOT_EXECUTION_QTY_STEP: ${{ vars.BOT_EXECUTION_QTY_STEP || '0.001' }}
          BOT_EXECUTION_MIN_QTY: ${{ vars.BOT_EXECUTION_MIN_QTY || '0.001' }}
          BOT_EXECUTION_MAX_QTY: ${{ vars.BOT_EXECUTION_MAX_QTY }}
          BOT_EXECUTION_MAX_NOTIONAL: ${{ vars.BOT_EXECUTION_MAX_NOTIONAL || '100' }}
          BOT_EXECUTION_LEVERAGE: ${{ vars.BOT_EXECUTION_LEVERAGE || '15' }}
          BOT_EXECUTION_LIQUIDATION_BUFFER_PCT: ${{ vars.BOT_EXECUTION_LIQUIDATION_BUFFER_PCT || '0.6' }}
          TELEGRAM_ALERTS_ENABLED: ${{ vars.TELEGRAM_ALERTS_ENABLED || 'false' }}
          "TELEGRAM_BOT_TOKEN": ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          DISCORD_ALERTS_ENABLED: ${{ vars.DISCORD_ALERTS_ENABLED || 'false' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          mkdir -p deploy-package/env
          node <<'NODE'
          const fs = require("node:fs");
          const required = ["BOT_CONTROL_TOKEN", "BYBIT_API_KEY", "BYBIT_API_SECRET"];
          const missing = required.filter((key) => !String(process.env[key] || "").trim());
          if (missing.length > 0) {
            console.error(`Missing required runtime environment values: ${missing.join(", ")}`);
            process.exit(1);
          }
          if (!String(process.env.BYBIT_PRIVATE_BASE_URL || "").trim()) {
            process.env.BYBIT_PRIVATE_BASE_URL =
              process.env.BOT_MODE === "TESTNET" ? "https://api-testnet.bybit.com" : "https://api.bybit.com";
          }
          const keys = [
            "BOT_MODE",
            "BOT_API_HOST",
            "BOT_API_PORT",
            "BOT_CONTROL_TOKEN",
            "BOT_DATABASE_PATH",
            "BOT_SYMBOL",
            "BOT_TIMEFRAMES",
            "BOT_VOLUME_FLOW_COMPOSITE_CONFIG_PATH",
            "BOT_STRATEGY_PROFILE_STATE_PATH",
            "BOT_FORWARD_MARKET_CAPTURE_ENABLED",
            "BYBIT_PUBLIC_WEBSOCKET_URL",
            "BOT_FORWARD_ORDER_BOOK_DEPTH",
            "BYBIT_API_KEY",
            "BYBIT_API_SECRET",
            "BYBIT_PRIVATE_BASE_URL",
            "BYBIT_RECV_WINDOW_MILLIS",
            "BYBIT_POSITION_IDX",
            "BYBIT_ACCOUNT_TYPE",
            "BOT_PRIVATE_EXECUTION_ENABLED",
            "BOT_EXECUTION_LOOP_ENABLED",
            "BOT_EXECUTION_TIMEFRAME",
            "BOT_EXECUTION_CANDLE_LIMIT",
            "BOT_EXECUTION_SYNC_LIMIT",
            "BOT_EXECUTION_ALERT_BATCH_LIMIT",
            "BOT_EXECUTION_INTERVAL_SECONDS",
            "BOT_EXECUTION_ACCOUNT_EQUITY",
            "BOT_EXECUTION_USE_LIVE_EQUITY",
            "BOT_EXECUTION_RISK_FRACTION",
            "BOT_EXECUTION_FEE_RATE",
            "BOT_EXECUTION_SLIPPAGE_BUFFER_RATE",
            "BOT_EXECUTION_QTY_STEP",
            "BOT_EXECUTION_MIN_QTY",
            "BOT_EXECUTION_MAX_QTY",
            "BOT_EXECUTION_MAX_NOTIONAL",
            "BOT_EXECUTION_LEVERAGE",
            "BOT_EXECUTION_LIQUIDATION_BUFFER_PCT",
            "TELEGRAM_ALERTS_ENABLED",
            "TELEGRAM_BOT_TOKEN",
            "TELEGRAM_CHAT_ID",
            "DISCORD_ALERTS_ENABLED",
            "DISCORD_WEBHOOK_URL",
          ];
          const lines = keys.map((key) => `${key}=${process.env[key] || ""}`);
          fs.writeFileSync("deploy-package/env/bybit-trader.env", `${lines.join("\n")}\n`, { mode: 0o600 });
          NODE

      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Prepare remote Docker directories
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ONPREM_SSH_HOST }}
          username: ${{ secrets.ONPREM_SSH_USER }}
          key: ${{ secrets.ONPREM_SSH_PRIVATE_KEY }}
          "password": ${{ secrets.ONPREM_SSH_PASSWORD }}
          port: ${{ secrets.ONPREM_SSH_PORT }}
          fingerprint: ${{ secrets.ONPREM_SSH_FINGERPRINT }}
          command_timeout: 5m
          script: |
            set -eu
            mkdir -p '${{ secrets.ONPREM_DEPLOY_DIR }}/config' \
              '${{ secrets.ONPREM_DEPLOY_DIR }}/env' \
              '${{ secrets.ONPREM_DEPLOY_DIR }}/images'

      - name: Upload Docker deployment package
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.ONPREM_SSH_HOST }}
          username: ${{ secrets.ONPREM_SSH_USER }}
          key: ${{ secrets.ONPREM_SSH_PRIVATE_KEY }}
          "password": ${{ secrets.ONPREM_SSH_PASSWORD }}
          port: ${{ secrets.ONPREM_SSH_PORT }}
          fingerprint: ${{ secrets.ONPREM_SSH_FINGERPRINT }}
          command_timeout: 20m
          source: "deploy-package/*"
          target: ${{ secrets.ONPREM_DEPLOY_DIR }}
          strip_components: 1

      - name: Load images and restart compose services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ONPREM_SSH_HOST }}
          username: ${{ secrets.ONPREM_SSH_USER }}
          key: ${{ secrets.ONPREM_SSH_PRIVATE_KEY }}
          "password": ${{ secrets.ONPREM_SSH_PASSWORD }}
          port: ${{ secrets.ONPREM_SSH_PORT }}
          fingerprint: ${{ secrets.ONPREM_SSH_FINGERPRINT }}
          command_timeout: 20m
          script: |
            set -eu
            cd '${{ secrets.ONPREM_DEPLOY_DIR }}'
            . ./release.env
            docker load -i "images/${BOT_IMAGE_TAR}"
            docker load -i "images/${DASHBOARD_IMAGE_TAR}"
            prune_image_archives() {
              name_pattern="$1"
              find images -maxdepth 1 -type f -name "${name_pattern}" -exec ls -1t {} + 2>/dev/null \
                | tail -n +4 \
                | while IFS= read -r archive; do
                    rm -f "${archive}"
                  done
            }
            prune_image_archives "bybit-trader-v*.tar.gz"
            prune_image_archives "bybit-trader-dashboard-v*.tar.gz"
            printf '%s\n' \
              "BOT_IMAGE=${BOT_IMAGE}" \
              "DASHBOARD_IMAGE=${DASHBOARD_IMAGE}" \
              'DASHBOARD_BIND_HOST=${{ secrets.ONPREM_DOCKER_BIND_HOST }}' \
              'DASHBOARD_PORT=${{ vars.DASHBOARD_PORT || '8080' }}' \
              'BOT_ENV_FILE=${{ secrets.ONPREM_DEPLOY_DIR }}/env/bybit-trader.env' > .env
            test -f '${{ secrets.ONPREM_DEPLOY_DIR }}/env/bybit-trader.env'
            docker compose --env-file .env -f compose.yaml up -d --remove-orphans
            docker compose --env-file .env -f compose.yaml ps
            . ./.env
            for i in $(seq 1 30); do
              if curl -fsS "http://${DASHBOARD_BIND_HOST}:${DASHBOARD_PORT}/" >/dev/null \
                && curl -fsS "http://${DASHBOARD_BIND_HOST}:${DASHBOARD_PORT}/api/health" >/dev/null; then
                exit 0
              fi
              sleep 2
            done
            docker compose --env-file .env -f compose.yaml logs --tail=120 bybit-trader bybit-trader-dashboard
            exit 1
