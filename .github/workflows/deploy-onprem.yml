name: Deploy On-Prem

on:
  workflow_dispatch:

concurrency:
  group: onprem-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: onprem-live
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --tag "bybit-trader:${GITHUB_SHA}" .
          docker save "bybit-trader:${GITHUB_SHA}" | gzip > bybit-trader-image.tar.gz

      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Configure SSH
        env:
          ONPREM_SSH_PRIVATE_KEY: ${{ secrets.ONPREM_SSH_PRIVATE_KEY }}
          ONPREM_SSH_HOST: ${{ secrets.ONPREM_SSH_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$ONPREM_SSH_PRIVATE_KEY" > ~/.ssh/onprem_deploy_key
          chmod 600 ~/.ssh/onprem_deploy_key
          ssh-keyscan -H "$ONPREM_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          ONPREM_SSH_HOST: ${{ secrets.ONPREM_SSH_HOST }}
          ONPREM_SSH_USER: ${{ secrets.ONPREM_SSH_USER }}
          ONPREM_DEPLOY_DIR: ${{ secrets.ONPREM_DEPLOY_DIR }}
        run: |
          ssh -i ~/.ssh/onprem_deploy_key "${ONPREM_SSH_USER}@${ONPREM_SSH_HOST}" \
            "mkdir -p '${ONPREM_DEPLOY_DIR}/config' '${ONPREM_DEPLOY_DIR}/env' '${ONPREM_DEPLOY_DIR}/images'"
          rsync -az --delete -e "ssh -i ~/.ssh/onprem_deploy_key" \
            compose.yaml \
            "${ONPREM_SSH_USER}@${ONPREM_SSH_HOST}:${ONPREM_DEPLOY_DIR}/compose.yaml"
          rsync -az --delete -e "ssh -i ~/.ssh/onprem_deploy_key" \
            config/volume-flow-composite-current.json \
            "${ONPREM_SSH_USER}@${ONPREM_SSH_HOST}:${ONPREM_DEPLOY_DIR}/config/volume-flow-composite-current.json"
          rsync -az -e "ssh -i ~/.ssh/onprem_deploy_key" \
            bybit-trader-image.tar.gz \
            "${ONPREM_SSH_USER}@${ONPREM_SSH_HOST}:${ONPREM_DEPLOY_DIR}/images/bybit-trader-${GITHUB_SHA}.tar.gz"

      - name: Load image and restart compose service
        env:
          ONPREM_SSH_HOST: ${{ secrets.ONPREM_SSH_HOST }}
          ONPREM_SSH_USER: ${{ secrets.ONPREM_SSH_USER }}
          ONPREM_DEPLOY_DIR: ${{ secrets.ONPREM_DEPLOY_DIR }}
          ONPREM_DOCKER_BIND_HOST: ${{ secrets.ONPREM_DOCKER_BIND_HOST }}
        run: |
          bind_host="${ONPREM_DOCKER_BIND_HOST:-127.0.0.1}"
          ssh -i ~/.ssh/onprem_deploy_key "${ONPREM_SSH_USER}@${ONPREM_SSH_HOST}" \
            "set -euo pipefail
             cd '${ONPREM_DEPLOY_DIR}'
             docker load -i 'images/bybit-trader-${GITHUB_SHA}.tar.gz'
             printf '%s\n' \
               'BOT_IMAGE=bybit-trader:${GITHUB_SHA}' \
               'BOT_BIND_HOST=${bind_host}' \
               'BOT_API_PORT=8080' \
               'BOT_ENV_FILE=${ONPREM_DEPLOY_DIR}/env/bybit-trader.env' > .env
             test -f '${ONPREM_DEPLOY_DIR}/env/bybit-trader.env'
             docker compose --env-file .env -f compose.yaml up -d
             docker compose --env-file .env -f compose.yaml ps"
