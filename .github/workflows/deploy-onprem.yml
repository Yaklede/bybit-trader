name: Deploy On-Prem

on:
  workflow_dispatch:

concurrency:
  group: onprem-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: onprem-testnet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify and assemble app
        run: |
          ./gradlew test lint build :modules:bot-app:installDist
          mkdir -p modules/bot-app/build/install/bot-app/config
          cp config/volume-flow-composite-current.json modules/bot-app/build/install/bot-app/config/

      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Configure SSH
        env:
          ONPREM_SSH_PRIVATE_KEY: ${{ secrets.ONPREM_SSH_PRIVATE_KEY }}
          ONPREM_SSH_HOST: ${{ secrets.ONPREM_SSH_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$ONPREM_SSH_PRIVATE_KEY" > ~/.ssh/onprem_deploy_key
          chmod 600 ~/.ssh/onprem_deploy_key
          ssh-keyscan -H "$ONPREM_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          ONPREM_SSH_HOST: ${{ secrets.ONPREM_SSH_HOST }}
          ONPREM_SSH_USER: ${{ secrets.ONPREM_SSH_USER }}
          ONPREM_DEPLOY_DIR: ${{ secrets.ONPREM_DEPLOY_DIR }}
        run: |
          release_dir="${ONPREM_DEPLOY_DIR}/releases/${GITHUB_SHA}"
          ssh -i ~/.ssh/onprem_deploy_key "${ONPREM_SSH_USER}@${ONPREM_SSH_HOST}" "mkdir -p '${release_dir}'"
          rsync -az --delete -e "ssh -i ~/.ssh/onprem_deploy_key" \
            modules/bot-app/build/install/bot-app/ \
            "${ONPREM_SSH_USER}@${ONPREM_SSH_HOST}:${release_dir}/"

      - name: Activate release
        env:
          ONPREM_SSH_HOST: ${{ secrets.ONPREM_SSH_HOST }}
          ONPREM_SSH_USER: ${{ secrets.ONPREM_SSH_USER }}
          ONPREM_DEPLOY_DIR: ${{ secrets.ONPREM_DEPLOY_DIR }}
          ONPREM_SYSTEMD_SERVICE: ${{ secrets.ONPREM_SYSTEMD_SERVICE }}
        run: |
          service_name="${ONPREM_SYSTEMD_SERVICE:-bybit-trader.service}"
          release_dir="${ONPREM_DEPLOY_DIR}/releases/${GITHUB_SHA}"
          ssh -i ~/.ssh/onprem_deploy_key "${ONPREM_SSH_USER}@${ONPREM_SSH_HOST}" \
            "ln -sfn '${release_dir}' '${ONPREM_DEPLOY_DIR}/current' && sudo systemctl restart '${service_name}' && sudo systemctl status --no-pager '${service_name}'"
