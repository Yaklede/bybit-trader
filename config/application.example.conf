bot {
  symbol = "BTCUSDT"
  mode = "PAPER"
  timeframes = ["M1", "M5", "M15"]
}

marketData {
  bybitPublicBaseUrl = "https://api.bybit.com"
}

bybitPrivate {
  apiKey = ${?BYBIT_API_KEY}
  apiSecret = ${?BYBIT_API_SECRET}
  baseUrl = "https://api-testnet.bybit.com"
  recvWindowMillis = 5000
  category = "linear"
  positionIdx = 0
}

paperLoop {
  enabled = true
  strategy = "volume-flow-aggressive"
  timeframe = "M5"
  candleLimit = 18000
  syncLimit = 1000
  intervalSeconds = 300
}

paperTrading {
  initialEquity = "1000000"
  riskFraction = "0.055"
  feeRate = "0.0006"
}

executionLoop {
  enabled = false
  # Runtime order: persist/alert new closed PnL, sync fully closed candles, then evaluate entry.
  timeframe = "M5"
  candleLimit = 18000
  syncLimit = 1000
  alertBatchLimit = 100
  intervalSeconds = 300
}

execution {
  enabled = false
  accountEquity = "660"
  useLiveAccountEquity = true
  riskFraction = "0.055"
  feeRate = "0.0006"
  slippageBufferRate = "0.0002"
  qtyStep = "0.001"
  minQty = "0.001"
  maxQty = ${?BOT_EXECUTION_MAX_QTY}
  maxNotional = ${?BOT_EXECUTION_MAX_NOTIONAL}
  leverage = "15"
}

risk {
  normalRiskPerTrade = "0.005"
  highConfidenceRisk = "0.010"
  maxDailyLoss = "0.030"
  maxWeeklyLoss = "0.060"
  maxMonthlyLoss = "0.120"
  maxConsecutiveLosses = 3
}

api {
  host = "127.0.0.1"
  port = 8080
  controlCredential = ${?BOT_CONTROL_TOKEN}
}

database {
  path = "data/bybit-trader.sqlite"
}

alerts {
  telegram {
    enabled = false
    botCredential = ${?TELEGRAM_BOT_TOKEN}
    chatId = ${?TELEGRAM_CHAT_ID}
  }

  discord {
    enabled = false
    webhookUrl = ${?DISCORD_WEBHOOK_URL}
  }
}
