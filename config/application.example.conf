bot {
  symbol = "BTCUSDT"
  mode = "PAPER"
  timeframes = ["M1", "M5", "M15"]
}

marketData {
  bybitPublicBaseUrl = "https://api.bybit.com"
}

paperLoop {
  enabled = true
  strategy = "volume-flow-aggressive"
  timeframe = "M5"
  candleLimit = 18000
  syncLimit = 1000
  intervalSeconds = 300
}

paperTrading {
  initialEquity = "1000000"
  riskFraction = "0.055"
  feeRate = "0.0006"
}

risk {
  normalRiskPerTrade = "0.005"
  highConfidenceRisk = "0.010"
  maxDailyLoss = "0.030"
  maxWeeklyLoss = "0.060"
  maxMonthlyLoss = "0.120"
  maxConsecutiveLosses = 3
}

api {
  host = "127.0.0.1"
  port = 8080
  controlCredential = ${?BOT_CONTROL_TOKEN}
}

database {
  path = "data/bybit-trader.sqlite"
}

alerts {
  telegram {
    enabled = false
    botCredential = ${?TELEGRAM_BOT_TOKEN}
    chatId = ${?TELEGRAM_CHAT_ID}
  }

  discord {
    enabled = false
    webhookUrl = ${?DISCORD_WEBHOOK_URL}
  }
}
